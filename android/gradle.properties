# Conservative heap so release builds succeed on typical dev machines (8G RAM).
org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m -XX:ReservedCodeCacheSize=256m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
kotlin.daemon.jvmargs=-Xmx1536m -XX:MaxMetaspaceSize=384m -XX:-UseParallelGC
android.useAndroidX=true
org.gradle.parallel=false
org.gradle.workers.max=2
